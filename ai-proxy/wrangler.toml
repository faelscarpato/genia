name = "genealogia-ia-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Configuração de observabilidade
[observability]
enabled = true

# Variáveis de ambiente (não-secretas)
[vars]
ALLOWED_ORIGIN = "http://localhost:3000"
# Em produção, atualize para a URL real do frontend:
# ALLOWED_ORIGIN = "https://genealogia-ia.pages.dev"

# Workers Secrets (configure via CLI):
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put OPENAI_API_KEY
# wrangler secret put PROXY_SECRET

# Ambiente de desenvolvimento
[env.dev]
name = "genealogia-ia-proxy-dev"

[env.dev.vars]
ALLOWED_ORIGIN = "http://localhost:3000"

# Ambiente de produção
[env.production]
name = "genealogia-ia-proxy"

[env.production.vars]
ALLOWED_ORIGIN = "https://genealogia-ia.pages.dev"

# Limites de CPU/memória
[limits]
cpu_ms = 30000
