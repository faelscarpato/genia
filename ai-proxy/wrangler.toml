name = "geniatree"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Observabilidade
[observability]
enabled = true

# [vars] = variaveis NAO-secretas (publicas no wrangler.toml)
# ALLOWED_ORIGIN controla quem pode chamar este Worker (CORS)
# Durante dev local: localhost:3000
# Em producao: URL do Pages
[vars]
ALLOWED_ORIGIN = "http://localhost:3000"

# Ambiente de desenvolvimento (npx wrangler dev)
[env.dev]
name = "geniatree-dev"
[env.dev.vars]
ALLOWED_ORIGIN = "http://localhost:3000"

# Ambiente de producao (npx wrangler deploy --env production)
[env.production]
name = "geniatree"
[env.production.vars]
ALLOWED_ORIGIN = "https://geniatree.pages.dev"

# Limites
[limits]
cpu_ms = 30000

# =============================================================
# SECRETS - configurar via CLI APOS o deploy:
#   cd ai-proxy
#   npx wrangler secret put GROQ_API_KEY        --env production
#   npx wrangler secret put MISTRAL_API_KEY     --env production
#   npx wrangler secret put OPENROUTER_API_KEY  --env production
#   npx wrangler secret put NVIDIA_API_KEY      --env production
#   npx wrangler secret put PROXY_SECRET        --env production
# =============================================================
